version: '3.8'

services:
  mongodb:
    image: mongo:6
    container_name: mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  redis:
    image: redis:alpine
    container_name: redis
    ports:
      - "6379:6379"

  backend:
    build: ./backend
    container_name: backend
    ports:
      - "5000:5000"
    environment:
      - MONGO_URI=mongodb://mongodb:27017/ai-task-processor
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=supersecret123
      - PORT=5000
    depends_on:
      - mongodb
      - redis

  worker:
    build: ./worker
    container_name: worker
    environment:
      - MONGO_URI=mongodb://mongodb:27017/ai-task-processor
      - REDIS_URL=redis://redis:6379
    depends_on:
      - mongodb
      - redis

  frontend:
    build: ./frontend
    container_name: frontend
    ports:
      - "8080:80"
    depends_on:
      - backend

volumes:
  mongo-data:
